[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
# EVM target compatible with Arbitrum Orbit L2 (Robinhood Chain). Orbit chains
# support the Cancun opcodes; "shanghai" is the conservative choice that also
# works on Arbitrum Sepolia. Bump to "cancun" only after confirming on-chain.
evm_version = "shanghai"
via_ir = false
bytecode_hash = "none"   # deterministic bytecode for reproducible verification
cbor_metadata = false
fs_permissions = [
    { access = "read", path = "./deploy" },
    { access = "read-write", path = "./snapshots" },
    { access = "read-write", path = "../deployments" },
]
gas_reports = ["CorporateActionRegistry", "DividendDistributor"]
ffi = false

[profile.ci]
verbosity = 3
fuzz = { runs = 1000 }
# fail_on_revert = true: every handler in our invariant suites guards its
# preconditions and returns early instead of reverting, so a revert signals a real
# handler/logic bug rather than an expected no-op. Keep it strict in CI.
invariant = { runs = 256, depth = 64, fail_on_revert = true }

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 128
depth = 32
fail_on_revert = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
sort_imports = true

# RPC endpoints — values pulled from environment so no secrets live in the repo.
[rpc_endpoints]
robinhood_testnet = "${ROBINHOOD_TESTNET_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
# Blockscout-compatible verification for Robinhood Chain testnet.
robinhood_testnet = { key = "${BLOCKSCOUT_API_KEY}", url = "${ROBINHOOD_BLOCKSCOUT_API_URL}", chain = 46630 }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }
