# Frontend CI for the Parvalon Next.js app (@parvalon/app): lint, typecheck, build.
name: frontend

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "abis/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "app/**"
      - "abis/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    name: lint / typecheck / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm -w @parvalon/app run lint

      - name: Typecheck
        run: npm -w @parvalon/app run typecheck

      - name: Build
        # NEXT_PUBLIC_* are inlined at build time; supply inert, non-secret
        # defaults so a no-network CI build of static/SSR pages succeeds.
        env:
          NEXT_PUBLIC_CHAIN_ID: "31337"
          NEXT_PUBLIC_RPC_URL: "http://127.0.0.1:8545"
          NEXT_PUBLIC_BLOCKSCOUT_URL: "https://explorer.testnet.chain.robinhood.com"
        run: npm -w @parvalon/app run build
