# TypeScript workspaces CI — typechecks and tests every npm workspace:
#   @corporax/sdk, @corporax/snapshot, @corporax/monitor, @corporax/example-agent
# (and the Next.js app's typecheck). The snapshot CLI produces the canonical
# corporax-merkle-v1 proofs.json whose leaf encoding is frozen in
# docs/INTEGRATION.md §4-5; its parity test asserts JS↔Solidity equivalence.
name: ts

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "packages/**"
      - "tooling/**"
      - "examples/**"
      - "abis/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cli.yml"
  pull_request:
    paths:
      - "app/**"
      - "packages/**"
      - "tooling/**"
      - "examples/**"
      - "abis/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cli.yml"
  workflow_dispatch:

concurrency:
  group: ts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workspaces:
    name: typecheck / test (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Test all TS workspaces
        run: npm run test:ts

  subgraph:
    name: subgraph codegen (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true # deploy-time tooling; graph-cli is heavy and chain-specific
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Codegen + build
        working-directory: subgraph
        run: |
          npm install
          npm run codegen
          npm run build
