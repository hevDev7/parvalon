# Slither static analysis for the Parvalon contracts.
#
# Runs the crytic/slither-action on contracts/, filtering vendored OpenZeppelin
# code (see contracts/slither.config.json). Findings are uploaded as SARIF so
# they surface in the GitHub "Security > Code scanning" tab. The job BLOCKS the
# merge on any high/medium finding (fail-on: medium); low/informational detectors
# still surface in SARIF but do not fail the gate.
name: slither

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/slither.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/slither.yml"
  workflow_dispatch:

concurrency:
  group: slither-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required to upload SARIF results to code scanning.
  security-events: write

jobs:
  analyze:
    name: slither static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # slither-action needs Foundry on PATH to compile this foundry project.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        id: slither
        # Keep going to the SARIF upload even when the gate fails, so findings are
        # always visible; the explicit gate step below is what blocks the merge.
        continue-on-error: true
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          sarif: results.sarif
          # Block the merge on any high/medium finding.
          fail-on: medium

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        # Only attempt the upload if Slither produced a SARIF file.
        if: always() && steps.slither.outputs.sarif != ''
        continue-on-error: true
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
          category: slither

      - name: Fail on high/medium findings
        # The Slither step is continue-on-error so SARIF always uploads; this gate
        # turns a high/medium finding (fail-on: medium) into a blocking job failure.
        if: steps.slither.outcome == 'failure'
        run: |
          echo "Slither reported a high/medium finding — see the Security > Code scanning tab." >&2
          exit 1
